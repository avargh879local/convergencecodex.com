<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Comment System Test</title>
<style>
  body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #0d0d0d; color: #e0e0e0; }
  h1 { color: #7ecfff; }
  .status { padding: 10px 14px; border-radius: 6px; margin: 8px 0; }
  .ok  { background: #0f3d1f; color: #4cff7e; border-left: 4px solid #4cff7e; }
  .err { background: #3d0f0f; color: #ff6b6b; border-left: 4px solid #ff6b6b; }
  .info { background: #1a1a2e; color: #a0b0ff; border-left: 4px solid #4060ff; }
  pre { background: #111; padding: 12px; border-radius: 4px; overflow: auto; font-size: 12px; white-space: pre-wrap; }
  input, textarea, button { width: 100%; box-sizing: border-box; margin: 6px 0; padding: 8px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; font-family: monospace; }
  button { cursor: pointer; background: #1a3a5c; color: #7ecfff; border-color: #4080cc; }
  button:hover { background: #264a70; }
  h2 { color: #aaa; font-size: 14px; margin-top: 30px; border-bottom: 1px solid #333; padding-bottom: 4px; }
</style>
</head>
<body>
<h1>Comment API Test</h1>

<h2>1. GET /api/comments (fetch existing comments for this page)</h2>
<div id="get-status" class="status info">Waiting…</div>
<pre id="get-out"></pre>

<h2>2. POST a test comment</h2>
<input id="name" placeholder="Your name" value="Test User">
<textarea id="body" rows="3" placeholder="Comment body">Hello from the test page!</textarea>
<button onclick="postComment()">Post Comment</button>
<div id="post-status" class="status info">Not sent yet</div>
<pre id="post-out"></pre>

<h2>3. Reload comments after posting</h2>
<button onclick="getComments()">Refresh comments</button>
<div id="comments-out"></div>

<script>
const PAGE = location.pathname; // /test-comments/

function log(elId, obj) {
  document.getElementById(elId).textContent = JSON.stringify(obj, null, 2);
}

function getComments() {
  var st = document.getElementById('get-status');
  st.textContent = 'Fetching GET /api/comments?page=' + encodeURIComponent(PAGE) + ' …';
  st.className = 'status info';

  fetch('/api/comments?page=' + encodeURIComponent(PAGE))
    .then(function(r) {
      return r.json().then(function(body) { return { status: r.status, body: body }; });
    })
    .then(function(res) {
      if (res.status === 200) {
        st.textContent = '✅ GET 200 — got ' + res.body.length + ' comment(s)';
        st.className = 'status ok';
      } else {
        st.textContent = '❌ GET ' + res.status;
        st.className = 'status err';
      }
      log('get-out', res);

      var html = res.body.length
        ? res.body.map(function(c) {
            return '<div class="status ok"><b>' + esc(c.name) + '</b> · ' + c.created_at + '<br>' + esc(c.body) + '</div>';
          }).join('')
        : '<div class="status info">No comments yet for this page.</div>';
      document.getElementById('comments-out').innerHTML = html;
    })
    .catch(function(err) {
      st.textContent = '❌ Network error: ' + err.message;
      st.className = 'status err';
      log('get-out', { error: err.message });
    });
}

function postComment() {
  var st = document.getElementById('post-status');
  var name = document.getElementById('name').value;
  var body = document.getElementById('body').value;
  st.textContent = 'Posting…';
  st.className = 'status info';

  fetch('/api/comments', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ page: PAGE, name: name, body: body, hp: '' })
  })
    .then(function(r) {
      return r.json().then(function(b) { return { status: r.status, body: b }; });
    })
    .then(function(res) {
      if (res.status === 200 && res.body.ok) {
        st.textContent = '✅ POST 200 — comment saved!';
        st.className = 'status ok';
        getComments();
      } else {
        st.textContent = '❌ POST ' + res.status;
        st.className = 'status err';
      }
      log('post-out', res);
    })
    .catch(function(err) {
      st.textContent = '❌ Network error: ' + err.message;
      st.className = 'status err';
      log('post-out', { error: err.message });
    });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

getComments();
</script>
</body>
</html>
